services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: node-express-boilerplate-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SQLSERVER_PASSWORD:-YourStrong!Passw0rd}
      MSSQL_PID: Developer
    ports:
      - "${SQLSERVER_PORT:-1433}:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P ${SQLSERVER_PASSWORD:-YourStrong!Passw0rd} -C -Q \"SELECT 1\" || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  sqlserver-data:
